<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e6efff">
<title>Ramzey Nassar — DOE Media</title>
<meta property="og:title" content="Ramzey Nassar — Founder & CEO at DOE Media">
<meta property="og:type" content="profile">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
</head>
<body class="holo">
<main class="stage" data-name="Ramzey Nassar" data-email="ramzey@doemedia.com" data-first="Ramzey">

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="scan-line"></div>

  <div class="top-label">
    <span class="top-left"><span class="dot"></span>ID · DOE Media</span>
    <span>NO. 0001 / 2026</span>
  </div>

  <div class="holo-card">
    <div class="holo-edge"></div>
    <div class="photo-window">
      <img class="hero-photo" src="photo.jpg" alt="Ramzey Nassar">
      <div class="photo-overlay"></div>
      <div class="photo-badge">✦ DOE Media</div>
      <div class="photo-bottom">
        <div class="kicker">Verified · DOE Media</div>
        <div class="big-name">Ramzey Nassar</div>
        <div class="role">Founder & CEO</div>
      </div>
    </div>

    <div class="data-block">
      <div class="grid">
        <div class="cell" style="grid-column: span 2">
          <div class="cell-label">Phone</div>
          <div class="cell-value">+1 (305) 336-1535</div>
        </div>
        <div class="cell" style="grid-column: span 2">
          <div class="cell-label">Email</div>
          <div class="cell-value">ramzey@doemedia.com</div>
        </div>
      </div>
      <div class="tagline">&gt; Founder & CEO</div>
    </div>
  </div>

  <div class="dock">
    <button class="dock-btn" data-action="mail" type="button">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>
      Email
    </button>
    <button class="dock-btn" data-action="call" type="button">
      <svg viewBox="0 0 24 24"><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 6 6L15 14l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>
      Call
    </button>
    <button class="dock-btn" data-action="whatsapp" type="button">
      <svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 0 1-11.6 7.1L4 20l1-4.5A8 8 0 1 1 21 12z"/></svg>
      Chat
    </button>
    <button class="dock-btn" data-action="website" type="button">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a13 13 0 0 1 0 18M12 3a13 13 0 0 0 0 18"/></svg>
      Web
    </button>
  </div>

  <div class="cta-row">
    <button class="save-btn" data-action="save" type="button">
      <svg viewBox="0 0 24 24"><path d="M12 4v12"/><path d="m6 12 6 6 6-6"/><path d="M4 20h16"/></svg>
      Save Contact
    </button>
    <button class="reply-btn" data-action="reply" type="button">
      Reply
      <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
    </button>
  </div>

  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-kicker">↳ YOUR TURN</div>
    <h2 class="sheet-title">Send me <span class="accent">your</span> info</h2>

    <a class="sheet-mail-btn" href="mailto:ramzey@doemedia.com?subject=My%20contact%20for%20Ramzey%20Nassar&body=Hi%20Ramzey%2C%0A%0AI%20met%20you%20and%20wanted%20to%20share%20my%20contact%20info.%20I%27ve%20attached%20my%20contact%20card%20to%20this%20email%20%28tap%20the%20%2B%20button%20in%20Mail%20to%20attach%20yours%29.%0A%0ALooking%20forward%20to%20staying%20in%20touch.%0A%0A%E2%80%94%20">
      <span><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg> Email me your card</span>
      <svg viewBox="0 0 24 24" class="arrow"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
    </a>

    <div class="or">OR</div>

    <p class="autofill-hint">Tap a field, then tap <strong>AutoFill</strong> on your keyboard.</p>

    <form id="contact-form" autocomplete="on">
      <div class="row">
        <input name="given-name" placeholder="First name" required autocomplete="given-name">
        <input name="family-name" placeholder="Last name" required autocomplete="family-name">
      </div>
      <input name="email" type="email" placeholder="Your email" required autocomplete="email" inputmode="email">
      <input name="phone" type="tel" placeholder="Phone (optional)" autocomplete="tel" inputmode="tel">
      <input name="company" placeholder="Company (optional)" autocomplete="organization">
      <textarea name="note" placeholder="Note (optional)" rows="2"></textarea>
      <button type="submit" class="send-btn">
        Send to Ramzey
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
      </button>
    </form>
  </div>
</main>

<script>
(function() {
  var stage = document.currentScript.previousElementSibling.querySelector ? document.currentScript.previousElementSibling : document.querySelector('.stage');
  var EMAIL = 'ramzey@doemedia.com';
  var FIRST = 'Ramzey';

  function downloadVCard() {
    var lines = [
      'BEGIN:VCARD','VERSION:3.0',
      'N:Nassar;Ramzey;;;',
      'FN:Ramzey Nassar',
      'ORG:DOE Media',
      'TITLE:Founder & CEO',
      'TEL;TYPE=CELL:+13053361535',
      'EMAIL;TYPE=INTERNET:ramzey@doemedia.com',
      'URL:https://doemedia.com',
      'END:VCARD'
    ];
    var blob = new Blob([lines.join('\r\n')], {type:'text/vcard'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'ramzey.vcf';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);}, 1000);
  }

  document.querySelectorAll('[data-action]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var k = btn.getAttribute('data-action');
      if (k === 'save') downloadVCard();
      else if (k === 'mail') location.href = 'mailto:' + EMAIL;
      else if (k === 'call') location.href = 'tel:+13053361535';
      else if (k === 'whatsapp') location.href = 'https://wa.me/13053361535';
      else if (k === 'website') window.open('https://doemedia.com', '_blank');
      else if (k === 'reply') openSheet();
    });
  });

  var sheet = document.getElementById('sheet');
  var backdrop = document.getElementById('sheet-backdrop');
  function openSheet() { sheet.classList.add('open'); backdrop.classList.add('open'); }
  function closeSheet() { sheet.classList.remove('open'); backdrop.classList.remove('open'); }
  backdrop.addEventListener('click', closeSheet);
  document.querySelector('.sheet-handle').addEventListener('click', closeSheet);

  var form = document.getElementById('contact-form');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var f = new FormData(form);
    var name = ((f.get('given-name')||'') + ' ' + (f.get('family-name')||'')).trim();
    var subj = 'Intro from ' + (name || 'someone');
    var body = [
      'Name: ' + name,
      'Email: ' + (f.get('email')||''),
      'Phone: ' + (f.get('phone')||''),
      'Company: ' + (f.get('company')||''),
      '',
      f.get('note')||''
    ].join('\n');
    location.href = 'mailto:' + EMAIL + '?subject=' + encodeURIComponent(subj) + '&body=' + encodeURIComponent(body);
  });
})();
</script>
</body>
</html>
